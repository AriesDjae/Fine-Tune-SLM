# Build image worker RunPod Serverless di cloud GitHub -> push ke GHCR.
# Alasan: laptop lokal tanpa Docker + disk C: sempit + upload rumahan lambat.
# Hasil: ghcr.io/ariesdjae/p6-train:v1  (SETELAH build pertama: buka halaman
# package di GitHub -> Package settings -> Change visibility -> PUBLIC,
# supaya RunPod bisa pull tanpa kredensial.)
name: build-docker

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - handler.py
      - serverless/**
      - requirements_pivot6.txt
      - .github/workflows/docker.yml
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Runner standar cuma ~14 GB kosong; image kita ~25-30 GB -> bebaskan dulu
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af
          df -h /

      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/ariesdjae/p6-train:v1
            ghcr.io/ariesdjae/p6-train:latest
            ghcr.io/ariesdjae/p6-train:sha-${{ github.sha }}
